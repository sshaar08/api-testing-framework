version: 2.1

# Docker image from Artifactory
# Image is built from api-test-core/docker/Dockerfile
# Published to: artifacts.company.com/api-test-core:2.1.0

# Define reusable commands
commands:
  setup-docker-image:
    steps:
      - run:
          name: Pull Docker image from Artifactory
          command: |
            echo "Logging into Artifactory..."
            echo ${ARTIFACTORY_TOKEN} | docker login -u ${ARTIFACTORY_USER} --password-stdin artifacts.company.com
            
            echo "Pulling test image..."
            docker pull artifacts.company.com/api-test-core:2.1.0
            
            echo "Image pulled successfully"

  configure-artifactory:
    steps:
      - run:
          name: Configure npm registry
          command: |
            npm config set registry=https://artifacts.company.com/npm/
            npm config set //artifacts.company.com/:_authToken=${ARTIFACTORY_TOKEN}

  run-tests:
    steps:
      - run:
          name: Run integration tests
          command: |
            docker run --rm \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e NODE_ENV=test \
              artifacts.company.com/api-test-core:2.1.0 \
              pnpm run test:integration

  generate-artifacts:
    steps:
      - run:
          name: Generate JUnit XML artifacts
          command: |
            docker run --rm \
              -v ./test-results:/app/test-results \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e NODE_ENV=test \
              artifacts.company.com/api-test-core:2.1.0 \
              pnpm run test:integration --reporter=junit --reporter-output=/app/test-results/

  upload-to-s3:
    steps:
      - run:
          name: Upload artifacts to S3
          command: |
            # Naming convention: lang-service-stage-deployNumber-datetime
            # Example: node-api-integration-main-1234-20240115_120000
            
            DEPLOY_NUMBER=${CIRCLE_BUILD_NUM}
            DATETIME=$(date +%Y%m%d_%H%M%S)
            S3_PATH="s3://company-test-results/node-api-integration-${CIRCLE_BRANCH}-${DEPLOY_NUMBER}-${DATETIME}/"
            
            # Upload test results to S3 data lake
            aws s3 cp ./test-results/ "${S3_PATH}" \
              --recursive \
              --exclude "*.log" \
              && echo "Artifacts uploaded to: ${S3_PATH}"

# Define jobs
jobs:
  # Smoke tests - fast, critical path only
  smoke-tests:
    environment:
      - NODE_ENV: test
      - CIRCLE_BRANCH: << pipeline.git.branch >>
      - CIRCLE_BUILD_NUM: << pipeline.number >>
    steps:
      - checkout
      - setup-docker-image
      - run:
          name: Run smoke tests
          command: |
            docker run --rm \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e NODE_ENV=test \
              artifacts.company.com/api-test-core:2.1.0 \
              pnpm run test:smoke
      - store_test_results:
          path: ./test-results
          when: always

  # Full integration test suite
  integration-tests:
    environment:
      - NODE_ENV: test
      - CIRCLE_BRANCH: << pipeline.git.branch >>
      - CIRCLE_BUILD_NUM: << pipeline.number >>
    steps:
      - checkout
      - setup-docker-image
      - run-tests
      - generate-artifacts
      - upload-to-s3
      - store_test_results:
          path: ./test-results
          when: always
      - store_artifacts:
          path: ./test-results
          when: always

  # Nightly comprehensive run
  nightly-tests:
    environment:
      - NODE_ENV: test
    steps:
      - checkout
      - setup-docker-image
      - run:
          name: Run full test suite (nightly)
          command: |
            docker run --rm \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e NODE_ENV=test \
              artifacts.company.com/api-test-core:2.1.0 \
              pnpm run test:all
      - generate-artifacts
      - upload-to-s3

# Define workflows
workflows:
  # On every PR and merge to main
  test-on-pr:
    jobs:
      - smoke-tests:
          filters:
            branches:
              ignore:
                - main
      - integration-tests:
          requires:
            - smoke-tests
          filters:
            branches:
              only:
                - main
                - /^feature/.*/
                - /^fix/.*/

  # Nightly run every day at midnight
  nightly:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - nightly-tests

  # Coverage check before merge
  coverage-check:
    jobs:
      - integration-tests:
          context: artifactory
          filters:
            branches:
              only:
                - main
