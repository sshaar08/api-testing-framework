version: 2.1

# ==============================================================================
# CircleCI Pipeline for API Integration Tests
#
# ASSUMPTION: Commands run INSIDE the Docker container
# - Image pulled from Nexus before this pipeline
# - We're already in the container when these commands run
# ==============================================================================
#
# Storage:
# - Docker Image: Nexus (nexus.company.com/api-test-core:2.1.0)
# - npm Packages: Artifactory (pulled at runtime)
#
# Authentication:
# - NEXUS_TOKEN: For pulling Docker image from Nexus
# - ARTIFACTORY_TOKEN: For pulling npm packages from Artifactory
# ==============================================================================

# ==============================================================================
# Pipeline Parameters
# All configurable via environment variables or GitHub Actions trigger
# ==============================================================================
parameters:
  service_name:
    type: string
    default: "api-test-core"
  commit_hash:
    type: string
    default: ""
  pr_number:
    type: string
    default: ""
  run_integration_tests:
    type: boolean
    default: false
  run_smoke_tests:
    type: boolean
    default: false
  run_nightly_tests:
    type: boolean
    default: false

# Define reusable commands
commands:
  configure-artifactory:
    steps:
      - run:
          name: Configure npm registry (Artifactory)
          command: |
            # We're already IN the container
            # Just configure npm to use Artifactory
            npm config set registry=https://artifacts.company.com/npm/
            npm config set //artifacts.company.com/:_authToken=${ARTIFACTORY_TOKEN}

  install-packages:
    steps:
      - run:
          name: Install npm packages from Artifactory
          command: |
            # npm packages pulled at runtime from Artifactory
            # Each team can use different versions
            pnpm install --frozen-lockfile

  run-smoke-tests:
    steps:
      - run:
          name: Run smoke tests
          command: |
            pnpm run test:smoke

  run-integration-tests:
    steps:
      - run:
          name: Run integration tests
          command: |
            pnpm run test:integration

  run-all-tests:
    steps:
      - run:
          name: Run full test suite
          command: |
            pnpm run test:all

  generate-artifacts:
    steps:
      - run:
          name: Generate JUnit XML artifacts
          command: |
            # Generate test results in JUnit XML format
            pnpm run test:integration --reporter=junit --reporter-output=./test-results/

  upload-to-s3:
    steps:
      - run:
          name: Upload artifacts to S3
          command: |
            # Naming convention: lang-service-stage-deployNumber-datetime
            # Example: node-api-integration-main-1234-20240115_120000
            
            DEPLOY_NUMBER=${CIRCLE_BUILD_NUM:-0}
            DATETIME=$(date +%Y%m%d_%H%M%S)
            SERVICE_NAME=${SERVICE_NAME:-<< pipeline.parameters.service_name >>}
            S3_PATH="s3://company-test-results/node-api-integration-${CIRCLE_BRANCH:-main}-${DEPLOY_NUMBER}-${DATETIME}/"
            
            # Upload test results to S3 data lake
            aws s3 cp ./test-results/ "${S3_PATH}" \
              --recursive \
              --exclude "*.log" \
              && echo "Artifacts uploaded to: ${S3_PATH}"

  log-trigger-context:
    steps:
      - run:
          name: Log trigger context
          command: |
            echo "=== Pipeline Trigger Context ==="
            echo "Service Name: << pipeline.parameters.service_name >>"
            echo "Commit Hash: << pipeline.parameters.commit_hash >>"
            echo "PR Number: << pipeline.parameters.pr_number >>"
            echo "Branch: << pipeline.git.branch >>"
            echo "Build Number: << pipeline.number >>"
            echo "================================"

# ==============================================================================
# Jobs (assume we're already inside the Docker container)
# ==============================================================================

jobs:
  # Smoke tests - fast, critical path only
  smoke-tests:
    docker:
      - image: nexus.company.com/api-test-core:2.1.0
    environment:
      - NODE_ENV: test
      - CIRCLE_BRANCH: << pipeline.git.branch >>
      - CIRCLE_BUILD_NUM: << pipeline.number >>
      - SERVICE_NAME: << pipeline.parameters.service_name >>
      - COMMIT_HASH: << pipeline.parameters.commit_hash >>
      - PR_NUMBER: << pipeline.parameters.pr_number >>
    steps:
      - checkout
      - log-trigger-context
      - configure-artifactory
      - install-packages
      - run-smoke-tests
      - store_test_results:
          path: ./test-results
          when: always

  # Full integration test suite
  integration-tests:
    docker:
      - image: nexus.company.com/api-test-core:2.1.0
    environment:
      - NODE_ENV: test
      - CIRCLE_BRANCH: << pipeline.git.branch >>
      - CIRCLE_BUILD_NUM: << pipeline.number >>
      - SERVICE_NAME: << pipeline.parameters.service_name >>
      - COMMIT_HASH: << pipeline.parameters.commit_hash >>
      - PR_NUMBER: << pipeline.parameters.pr_number >>
    steps:
      - checkout
      - log-trigger-context
      - configure-artifactory
      - install-packages
      - run-integration-tests
      - generate-artifacts
      - upload-to-s3
      - store_test_results:
          path: ./test-results
          when: always
      - store_artifacts:
          path: ./test-results
          when: always

  # Nightly comprehensive run
  nightly-tests:
    docker:
      - image: nexus.company.com/api-test-core:2.1.0
    environment:
      - NODE_ENV: test
      - SERVICE_NAME: << pipeline.parameters.service_name >>
    steps:
      - checkout
      - log-trigger-context
      - configure-artifactory
      - install-packages
      - run-all-tests
      - generate-artifacts
      - upload-to-s3

# ==============================================================================
# Workflows
# ==============================================================================

workflows:
  # On every PR and merge to main
  test-on-pr:
    jobs:
      - smoke-tests:
          filters:
            branches:
              ignore:
                - main
      - integration-tests:
          requires:
            - smoke-tests
          filters:
            branches:
              only:
                - main
                - /^feature/.*/
                - /^fix/.*/

  # Nightly run every day at midnight
  nightly:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - nightly-tests

  # Coverage check before merge
  coverage-check:
    jobs:
      - integration-tests:
          context: artifactory
          filters:
            branches:
              only:
                - main

  # Triggered via GitHub Actions when PR label 'deployAndRunTests' is added
  # Payload: { service_name, commit_hash, pr_number, run_integration_tests: true }
  triggered-by-github-actions:
    when: << pipeline.parameters.run_integration_tests >>
    jobs:
      - integration-tests
