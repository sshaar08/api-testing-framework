version: 2.1

# ==============================================================================
# Docker Image: Stored in Nexus (Platform team owned)
# - Image built from api-test-core/docker/Dockerfile
# - Published to: nexus.company.com/api-test-core:2.1.0
# - Image does NOT contain npm packages (pulled at runtime)
# - Same image shared across all teams (each pulls their own packages)
#
# Authentication:
# - NEXUS_USER: Nexus username (set in CircleCI context)
# - NEXUS_TOKEN: Nexus auth token (set in CircleCI context)
#
# npm Packages: Pulled at runtime via Artifactory
# - ARTIFACTORY_USER: Artifactory username for npm packages
# - ARTIFACTORY_TOKEN: Artifactory token for npm packages
# ==============================================================================

# Define reusable commands
commands:
  setup-docker-image:
    steps:
      - run:
          name: Pull Docker image from Nexus
          command: |
            echo "Logging into Nexus..."
            # NEXUS_TOKEN env var contains the auth token
            echo ${NEXUS_TOKEN} | docker login -u ${NEXUS_USER} --password-stdin nexus.company.com
            
            echo "Pulling test image..."
            docker pull nexus.company.com/api-test-core:2.1.0
            
            echo "Image pulled successfully"

  configure-artifactory:
    steps:
      - run:
          name: Configure npm registry (Artifactory)
          command: |
            # npm packages pulled at runtime from Artifactory
            # Teams can use different versions of @company/api-helpers
            npm config set registry=https://artifacts.company.com/npm/
            npm config set //artifacts.company.com/:_authToken=${ARTIFACTORY_TOKEN}

  run-tests:
    steps:
      - run:
          name: Run integration tests
          command: |
            # npm packages pulled at runtime inside container
            # Same image, different packages per team
            docker run --rm \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e ARTIFACTORY_USER=${ARTIFACTORY_USER} \
              -e NODE_ENV=test \
              nexus.company.com/api-test-core:2.1.0 \
              pnpm run test:integration

  generate-artifacts:
    steps:
      - run:
          name: Generate JUnit XML artifacts
          command: |
            # npm packages pulled at runtime, image just provides Node.js runtime
            docker run --rm \
              -v ./test-results:/app/test-results \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e ARTIFACTORY_USER=${ARTIFACTORY_USER} \
              -e NODE_ENV=test \
              nexus.company.com/api-test-core:2.1.0 \
              pnpm run test:integration --reporter=junit --reporter-output=/app/test-results/

  upload-to-s3:
    steps:
      - run:
          name: Upload artifacts to S3
          command: |
            # Naming convention: lang-service-stage-deployNumber-datetime
            # Example: node-api-integration-main-1234-20240115_120000
            
            DEPLOY_NUMBER=${CIRCLE_BUILD_NUM}
            DATETIME=$(date +%Y%m%d_%H%M%S)
            S3_PATH="s3://company-test-results/node-api-integration-${CIRCLE_BRANCH}-${DEPLOY_NUMBER}-${DATETIME}/"
            
            # Upload test results to S3 data lake
            aws s3 cp ./test-results/ "${S3_PATH}" \
              --recursive \
              --exclude "*.log" \
              && echo "Artifacts uploaded to: ${S3_PATH}"

# Define jobs
jobs:
  # Smoke tests - fast, critical path only
  smoke-tests:
    environment:
      - NODE_ENV: test
      - CIRCLE_BRANCH: << pipeline.git.branch >>
      - CIRCLE_BUILD_NUM: << pipeline.number >>
    steps:
      - checkout
      - setup-docker-image
      - run:
          name: Run smoke tests
          command: |
            docker run --rm \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e ARTIFACTORY_USER=${ARTIFACTORY_USER} \
              -e NODE_ENV=test \
              nexus.company.com/api-test-core:2.1.0 \
              pnpm run test:smoke
      - store_test_results:
          path: ./test-results
          when: always

  # Full integration test suite
  integration-tests:
    environment:
      - NODE_ENV: test
      - CIRCLE_BRANCH: << pipeline.git.branch >>
      - CIRCLE_BUILD_NUM: << pipeline.number >>
    steps:
      - checkout
      - setup-docker-image
      - run-tests
      - generate-artifacts
      - upload-to-s3
      - store_test_results:
          path: ./test-results
          when: always
      - store_artifacts:
          path: ./test-results
          when: always

  # Nightly comprehensive run
  nightly-tests:
    environment:
      - NODE_ENV: test
    steps:
      - checkout
      - setup-docker-image
      - run:
          name: Run full test suite (nightly)
          command: |
            docker run --rm \
              -e ARTIFACTORY_TOKEN=${ARTIFACTORY_TOKEN} \
              -e ARTIFACTORY_USER=${ARTIFACTORY_USER} \
              -e NODE_ENV=test \
              nexus.company.com/api-test-core:2.1.0 \
              pnpm run test:all
      - generate-artifacts
      - upload-to-s3

# Define workflows
workflows:
  # On every PR and merge to main
  test-on-pr:
    jobs:
      - smoke-tests:
          filters:
            branches:
              ignore:
                - main
      - integration-tests:
          requires:
            - smoke-tests
          filters:
            branches:
              only:
                - main
                - /^feature/.*/
                - /^fix/.*/

  # Nightly run every day at midnight
  nightly:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - nightly-tests

  # Coverage check before merge
  coverage-check:
    jobs:
      - integration-tests:
          context: artifactory
          filters:
            branches:
              only:
                - main
